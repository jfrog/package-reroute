name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run macOS tests
        run: sudo ./testing/test_install_certs_macos.sh

  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Windows tests
        shell: pwsh
        run: |
          $scriptPath = Join-Path $env:GITHUB_WORKSPACE "testing/test_install_certs_windows.ps1"
          $outFile = Join-Path $env:GITHUB_WORKSPACE "test-output.txt"
          $scriptPathEscaped = $scriptPath -replace "'", "''"
          $outFileEscaped = $outFile -replace "'", "''"
          $cmd = "& '$scriptPathEscaped' 2>&1 | Out-File -FilePath '$outFileEscaped' -Encoding utf8; exit `$LASTEXITCODE"
          $p = Start-Process powershell -ArgumentList '-NoProfile', '-ExecutionPolicy', 'Bypass', '-Command', $cmd -Wait -Verb RunAs -PassThru
          if (Test-Path $outFile) { Get-Content $outFile -Raw; Remove-Item $outFile -ErrorAction SilentlyContinue }
          if ($p.ExitCode -ne 0) { exit $p.ExitCode }
